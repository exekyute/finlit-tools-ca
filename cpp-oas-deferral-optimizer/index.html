<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CPP & OAS Deferral Optimizer</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    
    /* --- CUSTOM SLIDER STYLING --- */
    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      background: transparent; 
    }
    
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #4f46e5; 
      cursor: pointer;
      border: 3px solid white;
      box-shadow: 0 1px 4px rgba(0,0,0,0.4); 
    }
    
    input[type=range]::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #4f46e5;
      cursor: pointer;
      border: 3px solid white;
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }

    /* --- PRINT LAYOUT STYLING --- */
    @media print {
      body { background-color: white !important; }
      .no-print { display: none !important; }
      .shadow-sm, .shadow-lg { box-shadow: none !important; border: 1px solid #e2e8f0; }
    }
  </style>
</head>
<body class="bg-[#f8fafc] min-h-screen py-10">
  <div id="root"></div>

  <script type="text/babel" data-presets="react,typescript">
    // OPS CONTEXT: Helps Canadians decide what age to start CPP and OAS by projecting lifetime payout under different start ages.
    const { useState, useMemo, useEffect } = React;

    // M1 [Math Primitives]: pension multipliers + lifetime totals.
    // PIVOT: 0.6%/month early-CPP penalty, 0.7%/month late-CPP bonus, 0.6%/month late-OAS bonus. Changing any of these breaks every output.
    function calculatePensions(inputs) {
      let cppMultiplier = 1.0;
      if (inputs.cppAge < 65) {
        const monthsEarly = (65 - inputs.cppAge) * 12;
        cppMultiplier = 1 - (monthsEarly * 0.006);
      } else if (inputs.cppAge > 65) {
        const monthsLate = (inputs.cppAge - 65) * 12;
        cppMultiplier = 1 + (monthsLate * 0.007);
      }
      const monthlyCPP = inputs.baseCpp * cppMultiplier;

      let oasMultiplier = 1.0;
      if (inputs.oasAge > 65) {
        const monthsLate = (inputs.oasAge - 65) * 12;
        oasMultiplier = 1 + (monthsLate * 0.006);
      }
      const monthlyOAS = inputs.baseOas * oasMultiplier;

      const totalMonthlyIncome = monthlyCPP + monthlyOAS;
      
      const cppMonthsCollected = Math.max(0, (inputs.lifeExpectancy - inputs.cppAge) * 12);
      const oasMonthsCollected = Math.max(0, (inputs.lifeExpectancy - inputs.oasAge) * 12);
      
      const lifetimeCPP = monthlyCPP * cppMonthsCollected;
      const lifetimeOAS = monthlyOAS * oasMonthsCollected;
      const totalLifetime = lifetimeCPP + lifetimeOAS;

      const schedule = [];
      for (let age = 70; age <= 95; age += 5) {
        const cppCollected = Math.max(0, (age - inputs.cppAge) * 12) * monthlyCPP;
        const oasCollected = Math.max(0, (age - inputs.oasAge) * 12) * monthlyOAS;
        schedule.push({
          age: age,
          cumulativeCPP: cppCollected,
          cumulativeOAS: oasCollected,
          cumulativeTotal: cppCollected + oasCollected
        });
      }

      return {
        monthlyCPP,
        monthlyOAS,
        totalMonthlyIncome,
        totalLifetime,
        lifetimeCPP,
        lifetimeOAS,
        schedule
      };
    }

    // M2 [UI Component]: state, derived projection, formatters, render.
    function PensionCalculator() {
      // PIVOT: bumping APP_VERSION invalidates everyone's saved inputs — only bump when the shape of `inputs` changes.
      const APP_VERSION = "1.1";

      const defaultInputs = {
        version: APP_VERSION,
        baseCpp: 800,
        baseOas: 713,
        cppAge: 65,
        oasAge: 65,
        lifeExpectancy: 85
      };

      // M3 [State Persistence]: load saved inputs if version matches, else fall back to defaults.
      const [inputs, setInputs] = useState(() => {
        const savedData = localStorage.getItem('pension_user_inputs');
        if (savedData) {
          try {
            const parsed = JSON.parse(savedData);
            if (parsed.version === APP_VERSION) return parsed;
          } catch (e) { console.error("Could not load saved data"); }
        }
        return defaultInputs;
      });

      useEffect(() => {
        localStorage.setItem('pension_user_inputs', JSON.stringify(inputs));
      }, [inputs]);

      const projection = useMemo(() => calculatePensions(inputs), [inputs]);

      const formatCurrency = (val) => 
        new Intl.NumberFormat('en-CA', { style: 'currency', currency: 'CAD', maximumFractionDigits: 0 }).format(val);

      const handleInputChange = (field, value) => {
        setInputs(prev => ({ ...prev, [field]: value }));
      };

      const handleReset = () => setInputs(defaultInputs);

      const getSliderFillPct = (value, min, max) => ((value - min) / (max - min)) * 100;

      const handleDownloadCSV = () => {
        const headers = ["Age Reached", "Cumulative CPP Collected", "Cumulative OAS Collected", "Total Cash Received"];
        const rows = projection.schedule.map(row => [
          row.age,
          row.cumulativeCPP.toFixed(2),
          row.cumulativeOAS.toFixed(2),
          row.cumulativeTotal.toFixed(2)
        ]);
        
        const csvContent = "data:text/csv;charset=utf-8," + [headers.join(","), ...rows.map(e => e.join(","))].join("\n");
        const encodedUri = encodeURI(csvContent);
        
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", "Pension_Strategy_Export.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      const totalIncome = Math.max(projection.totalLifetime, 1);
      const cppPct = (projection.lifetimeCPP / totalIncome) * 100;
      const oasPct = (projection.lifetimeOAS / totalIncome) * 100;

      return (
        <div className="max-w-6xl mx-auto p-4 sm:p-6 lg:p-8 space-y-10 text-slate-800">
          
          <div className="text-center space-y-3 relative">
            <a
              href="../index.html"
              className="no-print absolute top-0 left-0 mt-2 ml-2 text-sm text-slate-500 hover:text-indigo-600 transition-colors font-medium underline underline-offset-4"
            >
              ← Home
            </a>
            <h1 className="text-4xl font-extrabold tracking-tight text-slate-900">CPP & OAS Deferral Optimizer</h1>
            <p className="text-lg text-slate-600 max-w-2xl mx-auto">
              Map your lifetime pension strategy. Customize your base estimates, set your timeline, and see the exact impact of deferral.
            </p>

            <button
              onClick={handleReset}
              className="no-print absolute top-0 right-0 mt-2 mr-2 text-sm text-slate-500 hover:text-indigo-600 transition-colors font-medium underline underline-offset-4"
            >
              Reset Defaults
            </button>
          </div>

          <div className="no-print bg-white p-6 rounded-2xl shadow-sm border border-slate-200 grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <label className="block text-sm font-semibold text-slate-700 mb-1">Estimated Base CPP (At Age 65)</label>
              <div className="relative">
                <span className="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">$</span>
                <input 
                  type="number" 
                  value={inputs.baseCpp} 
                  onChange={(e) => handleInputChange('baseCpp', Number(e.target.value))}
                  className="w-full pl-8 pr-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition"
                  placeholder="e.g. 800"
                />
              </div>
              <p className="text-xs text-slate-500 mt-1">Find this on your Service Canada account.</p>
            </div>
            <div>
              <label className="block text-sm font-semibold text-slate-700 mb-1">Estimated Base OAS (At Age 65)</label>
              <div className="relative">
                <span className="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-500">$</span>
                <input 
                  type="number" 
                  value={inputs.baseOas} 
                  onChange={(e) => handleInputChange('baseOas', Number(e.target.value))}
                  className="w-full pl-8 pr-4 py-2 rounded-lg border border-slate-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition"
                  placeholder="e.g. 713"
                />
              </div>
              <p className="text-xs text-slate-500 mt-1">Current maximum is typically assumed unless partial residency.</p>
            </div>
          </div>

          <div className="no-print bg-white p-6 sm:p-8 rounded-2xl shadow-lg shadow-slate-200/50 border border-slate-200 grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-10">
            
            <div className="flex flex-col justify-start">
              <label className="flex justify-between font-semibold text-slate-800 mb-3">
                <span>Start CPP At Age</span>
                <span className="text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full text-sm font-bold">{inputs.cppAge}</span>
              </label>
              <input 
                type="range" min="60" max="70" step="1" 
                value={inputs.cppAge}
                onChange={(e) => handleInputChange('cppAge', Number(e.target.value))}
                style={{ background: `linear-gradient(to right, #4f46e5 ${getSliderFillPct(inputs.cppAge, 60, 70)}%, #e2e8f0 ${getSliderFillPct(inputs.cppAge, 60, 70)}%)` }}
                className="w-full h-2 rounded-lg appearance-none focus:outline-none focus-visible:ring-4 focus-visible:ring-indigo-100 cursor-pointer"
              />
              <p className="text-xs text-slate-500 mt-2">
                {inputs.cppAge < 65 ? `Taking a ${( (65 - inputs.cppAge) * 7.2 ).toFixed(1)}% permanent penalty.` : 
                 inputs.cppAge > 65 ? `Earning a ${( (inputs.cppAge - 65) * 8.4 ).toFixed(1)}% permanent bonus.` : 
                 "Standard base rate at age 65."}
              </p>
            </div>

            <div className="flex flex-col justify-start">
              <label className="flex justify-between font-semibold text-slate-800 mb-3">
                <span>Start OAS At Age</span>
                <span className="text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full text-sm font-bold">{inputs.oasAge}</span>
              </label>
              <input 
                type="range" min="65" max="70" step="1" 
                value={inputs.oasAge}
                onChange={(e) => handleInputChange('oasAge', Number(e.target.value))}
                style={{ background: `linear-gradient(to right, #4f46e5 ${getSliderFillPct(inputs.oasAge, 65, 70)}%, #e2e8f0 ${getSliderFillPct(inputs.oasAge, 65, 70)}%)` }}
                className="w-full h-2 rounded-lg appearance-none focus:outline-none focus-visible:ring-4 focus-visible:ring-indigo-100 cursor-pointer"
              />
              <p className="text-xs text-slate-500 mt-2">
                 {inputs.oasAge > 65 ? `Earning a ${( (inputs.oasAge - 65) * 7.2 ).toFixed(1)}% permanent bonus.` : 
                 "Standard base rate at age 65."}
              </p>
            </div>

            <div className="flex flex-col justify-start col-span-1 md:col-span-2 pt-6 border-t border-slate-100">
              <label className="flex justify-between font-semibold text-slate-800 mb-3">
                <span>Expected Lifespan (For planning total payout)</span>
                <span className="text-teal-600 bg-teal-50 px-3 py-1 rounded-full text-sm font-bold">Age {inputs.lifeExpectancy}</span>
              </label>
              <input 
                type="range" min="70" max="100" step="1" 
                value={inputs.lifeExpectancy}
                onChange={(e) => handleInputChange('lifeExpectancy', Number(e.target.value))}
                style={{ background: `linear-gradient(to right, #0d9488 ${getSliderFillPct(inputs.lifeExpectancy, 70, 100)}%, #e2e8f0 ${getSliderFillPct(inputs.lifeExpectancy, 70, 100)}%)` }}
                className="w-full h-2 rounded-lg appearance-none focus:outline-none focus-visible:ring-4 focus-visible:ring-teal-100 cursor-pointer"
              />
            </div>
          </div>

          <div className="bg-slate-50 border border-slate-200 rounded-lg p-4 text-sm text-slate-600 flex items-start gap-3">
            <svg className="w-5 h-5 text-slate-400 mt-0.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <p>
              <strong>Planning Note:</strong> All figures shown are pre-tax, nominal amounts. This calculator assumes a strict linear progression and does not factor in future inflation, Time Value of Money (discount rates), or potential OAS clawbacks at higher income thresholds.
            </p>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div className="bg-indigo-600 text-white p-6 sm:p-8 rounded-2xl shadow-lg shadow-indigo-600/20 transform transition duration-300 hover:-translate-y-1">
              <p className="text-indigo-100 text-sm font-semibold tracking-wide uppercase mb-2">Total Monthly Pension</p>
              <p className="text-4xl font-extrabold">{formatCurrency(projection.totalMonthlyIncome)}<span className="text-lg font-normal opacity-80">/mo</span></p>
            </div>
            <div className="bg-white border border-slate-200 p-6 sm:p-8 rounded-2xl shadow-sm transform transition duration-300 hover:-translate-y-1">
              <p className="text-slate-600 text-sm font-semibold tracking-wide uppercase mb-2">Monthly CPP Share</p>
              <p className="text-4xl font-extrabold text-slate-800">{formatCurrency(projection.monthlyCPP)}</p>
            </div>
            <div className="bg-white border border-slate-200 p-6 sm:p-8 rounded-2xl shadow-sm transform transition duration-300 hover:-translate-y-1">
              <p className="text-slate-600 text-sm font-semibold tracking-wide uppercase mb-2">Monthly OAS Share</p>
              <p className="text-4xl font-extrabold text-teal-600">{formatCurrency(projection.monthlyOAS)}</p>
            </div>
          </div>

          <div className="bg-white border border-slate-200 p-6 sm:p-8 rounded-2xl shadow-sm space-y-6">
            <h3 className="font-bold text-slate-900 text-lg">Lifetime Value: {formatCurrency(projection.totalLifetime)}</h3>
            <p className="text-sm text-slate-500">Based on collecting until age {inputs.lifeExpectancy}.</p>
            
            <div className="w-full h-10 flex rounded-xl overflow-hidden border border-slate-100">
              <div style={{ width: `${cppPct}%` }} className="bg-slate-700 transition-all duration-700 ease-out" title="Lifetime CPP"></div>
              <div style={{ width: `${oasPct}%` }} className="bg-teal-500 transition-all duration-700 ease-out" title="Lifetime OAS"></div>
            </div>
            <div className="flex flex-wrap gap-6 text-sm font-semibold text-slate-700">
              <div className="flex items-center gap-2"><div className="w-4 h-4 bg-slate-700 rounded-md"></div>Total CPP ({formatCurrency(projection.lifetimeCPP)})</div>
              <div className="flex items-center gap-2"><div className="w-4 h-4 bg-teal-500 rounded-md"></div>Total OAS ({formatCurrency(projection.lifetimeOAS)})</div>
            </div>
          </div>

          <div className="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden">
            <div className="p-5 sm:p-6 border-b border-slate-100 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-slate-50/50">
              <h3 className="font-bold text-slate-900 text-lg">Cumulative Cash Collected Over Time</h3>
              
              <button 
                onClick={handleDownloadCSV}
                className="no-print text-sm bg-white border border-slate-300 hover:bg-slate-50 hover:text-indigo-600 focus:outline-none focus-visible:ring-4 focus-visible:ring-indigo-100 text-slate-700 py-2 px-5 rounded-lg shadow-sm transition-all font-semibold flex items-center gap-2"
              >
                <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
                Export CSV
              </button>
            </div>

            <div className="overflow-x-auto">
              <table className="w-full text-sm text-left">
                <thead className="bg-white text-slate-500 font-semibold uppercase tracking-wider text-xs border-b border-slate-200">
                  <tr>
                    <th className="px-6 py-5">Age Reached</th>
                    <th className="px-6 py-5">Cumulative CPP</th>
                    <th className="px-6 py-5">Cumulative OAS</th>
                    <th className="px-6 py-5 text-right text-indigo-600">Total Cash Received</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-slate-100">
                  {projection.schedule.map((row) => (
                    <tr key={row.age} className="hover:bg-slate-50 transition-colors">
                      <td className="px-6 py-5 font-bold text-slate-900">Age {row.age}</td>
                      <td className="px-6 py-5 font-medium text-slate-600">{formatCurrency(row.cumulativeCPP)}</td>
                      <td className="px-6 py-5 font-medium text-teal-600">{formatCurrency(row.cumulativeOAS)}</td>
                      <td className="px-6 py-5 text-right font-extrabold text-indigo-600">{formatCurrency(row.cumulativeTotal)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>

          <details className="bg-slate-50 border border-slate-200 rounded-xl group" open>
            <summary className="cursor-pointer px-5 py-4 text-sm font-bold text-slate-800 hover:text-indigo-700 select-none">
              Disclaimer &amp; sources
            </summary>
            <div className="px-5 pb-5 pt-1 text-sm text-slate-600 space-y-3">
              <p>This tool is illustrative only. It uses the published CPP/OAS adjustment rates (0.6%/month early-CPP penalty, 0.7%/month late-CPP bonus, 0.6%/month late-OAS bonus) applied to your own base estimates. It does <strong>not</strong> model future inflation, time-value-of-money discounting, OAS recovery tax (clawback) at higher incomes, marital or survivor benefits, post-65 contributions, or partial-residency adjustments to OAS.</p>
              <p>Your real entitlement depends on your full contribution and residency history. Verify your personal numbers in <a href="https://www.canada.ca/en/employment-social-development/services/my-account.html" target="_blank" rel="noopener" className="underline text-indigo-600">My Service Canada Account</a> and consult a qualified financial advisor before making a deferral decision.</p>
              <p className="text-xs text-slate-500">Not tax, legal, or investment advice.</p>
            </div>
          </details>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<PensionCalculator />);
  </script>
</body>
</html>
