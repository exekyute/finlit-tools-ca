<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RESP + CESG Optimizer</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Inter', sans-serif; }

    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      background: transparent;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #4f46e5;
      cursor: pointer;
      border: 3px solid white;
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }

    input[type=range]::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #4f46e5;
      cursor: pointer;
      border: 3px solid white;
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }

    @media print {
      body { background-color: white !important; }
      .no-print { display: none !important; }
      .shadow-sm, .shadow-lg { box-shadow: none !important; border: 1px solid #e2e8f0; }
    }
  </style>
</head>
<body class="bg-[#f8fafc] min-h-screen py-10">
  <div id="root"></div>

  <script type="text/babel" data-presets="react,typescript">
    // OPS CONTEXT: Projects a Canadian RESP year by year — contributions, CESG grant, growth — toward a 4-year tuition target.
    const { useState, useMemo, useEffect, useRef } = React;

    // M1 [Shared Helpers]: currency formatting, slider fill %, CSV download, defaults-merge load.
    const formatCurrency = (val) =>
      new Intl.NumberFormat('en-CA', {
        style: 'currency',
        currency: 'CAD',
        maximumFractionDigits: 0
      }).format(val);

    const getSliderFillPct = (value, min, max) =>
      ((value - min) / (max - min)) * 100;

    const downloadCSV = (headers, rows, filename) => {
      const csvContent = "data:text/csv;charset=utf-8," +
        [headers.join(","), ...rows.map(r => r.join(","))].join("\n");
      const encodedUri = encodeURI(csvContent);

      const link = document.createElement("a");
      link.setAttribute("href", encodedUri);
      link.setAttribute("download", filename);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    };

    // Defaults-merge keeps old saves forward-compatible: missing keys fall back to default.
    const loadInputsFromStorage = (key, defaults) => {
      try {
        const saved = localStorage.getItem(key);
        if (!saved) return defaults;
        const parsed = JSON.parse(saved);
        if (!parsed || typeof parsed !== 'object') return defaults;
        return { ...defaults, ...parsed };
      } catch (e) {
        return defaults;
      }
    };

    // M2 [Constants & Rules]: CRA RESP/CESG limits.
    // PIVOT: Federal RESP/CESG caps. Changing any value invalidates the lifetime room math and the bar breakdown downstream.
    const LIFETIME_CONTRIB_CAP = 50000;    // max contributions per beneficiary, ever
    const ANNUAL_CESG_ROOM     = 500;      // grant room earned each eligible year
    const MAX_CESG_PER_YEAR    = 1000;     // hard ceiling on grant claimed in any single year (catch-up cap)
    const LIFETIME_CESG_CAP    = 7200;     // grant ceiling per beneficiary, ever
    const CESG_MATCH_RATE      = 0.20;     // 20% government match on contributions
    const CESG_LAST_AGE        = 17;       // CESG eligibility ends Dec 31 of the year the child turns 17

    // PIVOT: Age 16-17 grant eligibility — either $2,000 total before age 16, OR $100+ in any 4 prior years. Only contributions inside the simulation are checked; real prior contributions aren't modelled.
    const RULE_1617_MIN_PRIOR_TOTAL   = 2000;
    const RULE_1617_MIN_PRIOR_YEARS   = 4;
    const RULE_1617_MIN_PER_YEAR      = 100;

    // M3 [Schedule Builder]: per-year contributions, CESG grant, growth, ending balance.
    function calculateRESPSchedule(inputs) {
      // Clamp child's age into the valid range so weird inputs don't crash the loop
      const startAge = Math.max(0, Math.min(CESG_LAST_AGE, inputs.childAge));

      // Running counters we'll update each year of the loop
      let lifetimeContribRoom  = LIFETIME_CONTRIB_CAP;  // shrinks as the parent contributes
      let lifetimeCESGRoom     = LIFETIME_CESG_CAP;     // shrinks as grant is earned
      let carryForwardCESGRoom = 0;                      // dollars of grant carried over from years we under-contributed
      let currentBalance       = 0;                      // RESP account balance at the start of each year

      // Outputs we'll build up as we go
      const schedule = [];
      let totalContributions = 0;
      let totalCESG          = 0;
      let hitContribCapEarly = false;
      let contribCapAge      = null;
      let hitCESGCapEarly    = false;
      let cesgCapAge         = null;

      // ---- MAIN LOOP: one iteration per year, from the child's current age through age 17 ----
      for (let age = startAge; age <= CESG_LAST_AGE; age++) {

        // 1) How much GRANT room does this year potentially have?
        //    Start with this year's $500 of room, add any unused carry-forward,
        //    then apply the $1,000-per-year claim ceiling and the remaining lifetime CESG cap.
        const totalRoomAvailable = ANNUAL_CESG_ROOM + carryForwardCESGRoom;
        let   cesgRoomThisYear   = Math.min(totalRoomAvailable, MAX_CESG_PER_YEAR, Math.max(0, lifetimeCESGRoom));

        // 2) Special rule for ages 16 and 17 — check if the beneficiary actually qualifies.
        //    If they don't meet the prior-contribution thresholds, no grant is paid this year.
        if (age >= 16) {
          const contribsBefore16 = schedule
            .filter(r => r.age < 16)
            .reduce((sum, r) => sum + r.contribution, 0);
          const yearsBefore16WithEnough = schedule
            .filter(r => r.age < 16 && r.contribution >= RULE_1617_MIN_PER_YEAR)
            .length;
          const eligible1617 = (
            contribsBefore16        >= RULE_1617_MIN_PRIOR_TOTAL ||
            yearsBefore16WithEnough >= RULE_1617_MIN_PRIOR_YEARS
          );
          if (!eligible1617) {
            cesgRoomThisYear = 0;
          }
        }

        // 3) How much can the parent CONTRIBUTE this year? Their target amount, capped by remaining lifetime room.
        const contribution = Math.min(inputs.annualContribution, Math.max(0, lifetimeContribRoom));

        // 4) Grant actually earned = 20% of what they put in, but never more than the room allows.
        const cesgEarned = Math.min(contribution * CESG_MATCH_RATE, cesgRoomThisYear);

        // 5) Subtract from lifetime budgets so next year reflects reality.
        lifetimeContribRoom -= contribution;
        lifetimeCESGRoom    -= cesgEarned;

        // 6) Whatever room we didn't use rolls over to next year (subject to the $1k ceiling, applied above).
        //    Note: when the 16-17 rule trips, cesgEarned is 0, so the full totalRoomAvailable rolls
        //    forward. That's fine — next year's 16-17 check will fail again with the same data, so
        //    the accumulated room just sits idle until eligibility ends at 17. No grant is lost or gained.
        carryForwardCESGRoom = Math.max(0, totalRoomAvailable - cesgEarned);

        // 7) Flag the FIRST year the parent runs out of contribution room (so the banner can mention the age).
        //    We only flag if it happens mid-projection — if it lands exactly on the final year, no banner needed.
        if (lifetimeContribRoom <= 0 && !hitContribCapEarly && age < CESG_LAST_AGE) {
          hitContribCapEarly = true;
          contribCapAge      = age;
        }
        // Same flag for the CESG grant cap
        if (lifetimeCESGRoom <= 0 && !hitCESGCapEarly && age < CESG_LAST_AGE) {
          hitCESGCapEarly = true;
          cesgCapAge      = age;
        }

        // 8) Apply this year's deposit and investment growth, then record the row.
        const totalDeposit  = contribution + cesgEarned;
        const returnEarned  = (currentBalance + totalDeposit) * inputs.returnRate;
        const endingBalance = currentBalance + totalDeposit + returnEarned;

        schedule.push({
          age,
          openingBalance: currentBalance,
          contribution,
          cesgEarned,
          returnEarned,
          endingBalance
        });

        // 9) Roll forward into next year's iteration.
        currentBalance       = endingBalance;
        totalContributions  += contribution;
        totalCESG           += cesgEarned;
      }

      // ---- POST-LOOP: compute 16-17 eligibility once for the UI to display ----
      // We recompute it after the loop so the value reflects the FINAL schedule
      // (the in-loop check is per-year and short-circuits CESG; this one is for the banner).
      const finalContribsBefore16 = schedule
        .filter(r => r.age < 16)
        .reduce((sum, r) => sum + r.contribution, 0);
      const finalYearsBefore16WithEnough = schedule
        .filter(r => r.age < 16 && r.contribution >= RULE_1617_MIN_PER_YEAR)
        .length;
      const eligibleAt1617 = (
        finalContribsBefore16        >= RULE_1617_MIN_PRIOR_TOTAL ||
        finalYearsBefore16WithEnough >= RULE_1617_MIN_PRIOR_YEARS
      );
      const has1617InProjection = schedule.some(r => r.age >= 16);

      // Pack everything the UI needs into a single object
      return {
        schedule,
        totalEndingBalance: currentBalance,
        totalContributions,
        totalCESG,
        hitContribCapEarly,
        contribCapAge,
        hitCESGCapEarly,
        cesgCapAge,
        yearsRemaining: CESG_LAST_AGE - startAge + 1,
        eligibleAt1617,
        has1617InProjection
      };
    }

    // M4 [Slider Bounds]: centralised so JSX reads min/max/step from one place.
    const SLIDER_BOUNDS = {
      childAge:            { min: 0,     max: CESG_LAST_AGE, step: 1     },
      annualContribution:  { min: 0,     max: 5000,          step: 250   },
      returnRate:          { min: 0,     max: 0.12,          step: 0.005 },
      tuitionGoal:         { min: 40000, max: 200000,        step: 5000  }
    };
    // Total possible years of CESG eligibility (age 0 through 17 inclusive) — used by
    // the "Years of CESG Remaining" progress bar to compute its fill percentage.
    const MAX_ELIGIBLE_YEARS = CESG_LAST_AGE + 1;

    // M5 [Balance Chart]: stacked area chart — cumulative contributions, +CESG, +growth.
    function BalanceChart({ projection }) {
      const canvasRef = useRef(null);   // points to the <canvas> DOM element
      const chartRef  = useRef(null);   // holds the Chart.js instance so we can destroy/replace it

      useEffect(() => {
        // Bail out if there's no canvas yet (e.g. the empty-state path below is showing)
        // or if there's nothing meaningful to chart.
        if (!canvasRef.current || projection.totalEndingBalance === 0) return;

        // Walk the schedule once to build cumulative arrays.
        // Bottom layer  = cumulative contributions (your cash)
        // Middle layer  = bottom + cumulative CESG (your cash + grant)
        // Top layer     = endingBalance for that year (the balance curve)
        let cumContrib = 0, cumCESG = 0;
        const labels        = [];
        const contribSeries = [];
        const cesgSeries    = [];
        const totalSeries   = [];
        projection.schedule.forEach(row => {
          cumContrib += row.contribution;
          cumCESG    += row.cesgEarned;
          labels.push(`Age ${row.age}`);
          contribSeries.push(cumContrib);
          cesgSeries.push(cumContrib + cumCESG);
          totalSeries.push(row.endingBalance);
        });

        // If there's already a chart from a previous render, tear it down first
        // so we don't leak Chart.js instances when the projection changes.
        if (chartRef.current) chartRef.current.destroy();

        // Build the Chart.js instance and store it on the ref for future cleanup.
        chartRef.current = new Chart(canvasRef.current, {
          type: 'line',
          data: {
            labels,
            datasets: [
              {
                // Bottom band — parent's contributions, in slate (same colour as the composition bar)
                label: 'Your Cash',
                data: contribSeries,
                borderColor: '#334155',                   // slate-700
                backgroundColor: 'rgba(51, 65, 85, 0.55)',
                fill: 'origin',                            // fill all the way down to the x-axis
                tension: 0.25,
                pointRadius: 3,
                pointHoverRadius: 5
              },
              {
                // Middle band — government grant, stacked on top of contributions
                label: 'CESG Grants',
                data: cesgSeries,
                borderColor: '#14b8a6',                   // teal-500
                backgroundColor: 'rgba(20, 184, 166, 0.55)',
                fill: '-1',                                // fill down to the previous dataset
                tension: 0.25,
                pointRadius: 3,
                pointHoverRadius: 5
              },
              {
                // Top band — market growth lifts the total to the actual endingBalance line
                label: 'Total (with Growth)',
                data: totalSeries,
                borderColor: '#38bdf8',                   // sky-400
                backgroundColor: 'rgba(56, 189, 248, 0.55)',
                fill: '-1',
                tension: 0.25,
                pointRadius: 3,
                pointHoverRadius: 5
              }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,                  // let the chart fill the parent <div className="h-80">
            interaction: { mode: 'index', intersect: false }, // hover anywhere on a column highlights all 3 layers
            scales: {
              y: {
                // Y-axis ticks formatted as Canadian dollars
                ticks: { callback: (value) => formatCurrency(value) }
              }
            },
            plugins: {
              tooltip: {
                callbacks: {
                  // Tooltip rows show "Dataset label: $X,XXX"
                  label: (ctx) => `${ctx.dataset.label}: ${formatCurrency(ctx.parsed.y)}`
                }
              },
              legend: {
                position: 'bottom',
                labels: { usePointStyle: true, padding: 16 }
              }
            }
          }
        });

        // Cleanup when the component unmounts or projection changes again
        return () => {
          if (chartRef.current) {
            chartRef.current.destroy();
            chartRef.current = null;
          }
        };
      }, [projection]);

      // Empty-state — show a friendly placeholder instead of an empty chart frame.
      if (projection.totalEndingBalance === 0) {
        return (
          <p className="text-sm text-slate-500 italic text-center py-12">
            Move the Annual Contribution slider above $0 to see the growth curve.
          </p>
        );
      }

      // Normal state — render the canvas inside a fixed-height container so
      // Chart.js's responsive mode has a stable size to work with.
      return (
        <div className="h-80">
          <canvas ref={canvasRef}></canvas>
        </div>
      );
    }

    // M6 [UI Component]: state, derived projection, formatters, render.
    function RESPCalculator() {
      const defaultInputs = {
        childAge:           5,
        annualContribution: 2500,
        returnRate:         0.06,
        tuitionGoal:        80000
      };

      // M7 [State Persistence]: defaults-merge keeps old saves forward-compatible.
      const [inputs, setInputs] = useState(() =>
        loadInputsFromStorage('resp_user_inputs_v1', defaultInputs)
      );

      useEffect(() => {
        localStorage.setItem('resp_user_inputs_v1', JSON.stringify(inputs));
      }, [inputs]);

      // Re-run the math brain whenever inputs change. useMemo caches the result so we don't
      // recompute the schedule on every unrelated re-render.
      const projection = useMemo(() => calculateRESPSchedule(inputs), [inputs]);

      // ---- EVENT HANDLERS ----
      // Update one slider's value while leaving the others alone
      const handleInputChange = (field, value) => {
        setInputs(prev => ({ ...prev, [field]: value }));
      };

      // Wipe everything back to the starting values
      const handleReset = () => {
        setInputs(defaultInputs);
      };

      // Build a CSV of the year-by-year table and trigger a browser download.
      // The actual file-construction logic is in the shared downloadCSV helper above.
      const handleDownloadCSV = () => {
        const headers = ["Child Age", "Opening Balance", "Your Contribution", "CESG Earned", "Return Earned", "Ending Balance"];
        const rows = projection.schedule.map(row => [
          row.age,
          row.openingBalance.toFixed(2),
          row.contribution.toFixed(2),
          row.cesgEarned.toFixed(2),
          row.returnEarned.toFixed(2),
          row.endingBalance.toFixed(2)
        ]);
        downloadCSV(headers, rows, "RESP_Projection.csv");
      };

      // ---- DERIVED VALUES for the composition bar ----
      // Total balance breaks down into 3 buckets: parent's cash, government grant, market growth.
      // We compute each as a percentage of the total so the bar can render proportional segments.
      const totalGrowth = projection.totalEndingBalance - projection.totalContributions - projection.totalCESG;
      const contribPct  = projection.totalEndingBalance > 0 ? (projection.totalContributions / projection.totalEndingBalance) * 100 : 0;
      const cesgPct     = projection.totalEndingBalance > 0 ? (projection.totalCESG          / projection.totalEndingBalance) * 100 : 0;
      const growthPct   = projection.totalEndingBalance > 0 ? (totalGrowth                   / projection.totalEndingBalance) * 100 : 0;

      // ---- DERIVED VALUES for the tuition goal overlay ----
      // Compute what % of the user's goal the projection covers, and which "story"
      // to tell underneath the progress bar (on-track vs. shortfall).
      const tuitionPct        = inputs.tuitionGoal > 0
        ? (projection.totalEndingBalance / inputs.tuitionGoal) * 100
        : 0;
      const tuitionPctClamped = Math.min(100, tuitionPct);                         // clipped for the bar width — never overflows the container
      const onTrack           = projection.totalEndingBalance >= inputs.tuitionGoal;
      const tuitionGap        = inputs.tuitionGoal - projection.totalEndingBalance; // positive = shortfall, negative = surplus

      // ---- THE PAGE LAYOUT ----
      return (
        <div className="max-w-6xl mx-auto p-4 sm:p-6 lg:p-8 space-y-10 text-slate-800">

          <div className="text-center space-y-3 relative">
            <a
              href="../index.html"
              className="no-print absolute top-0 left-0 mt-2 ml-2 text-sm text-slate-500 hover:text-indigo-600 transition-colors font-medium underline underline-offset-4"
            >
              ← Home
            </a>
            <h1 className="text-4xl font-extrabold tracking-tight text-slate-900">RESP + CESG Optimizer</h1>
            <p className="text-lg text-slate-600 max-w-2xl mx-auto">
              Plan your child's Registered Education Savings Plan. Capture the full $7,200 in free government grants and map their path to post-secondary.
            </p>

            <button
              onClick={handleReset}
              className="no-print absolute top-0 right-0 mt-2 mr-2 text-sm text-slate-500 hover:text-indigo-600 transition-colors font-medium underline underline-offset-4"
              aria-label="Reset all sliders to default values"
            >
              Reset Defaults
            </button>
          </div>

          {/* INPUT CARD: white card containing the input slots.
              Rows 1-2: a 2x2 grid of the three sliders plus a read-only "Years of CESG Remaining" display.
              Row 3:    full-width "4-Year Tuition Goal" slider, separated by a top border. */}
          <div className="no-print bg-white p-6 sm:p-8 rounded-2xl shadow-lg shadow-slate-200/50 border border-slate-200 grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-10">

            {/* ROW 1, LEFT CELL: Child's Age slider */}
            <div className="flex flex-col justify-start">
              <label htmlFor="age-slider" className="flex justify-between font-semibold text-slate-800 mb-3">
                <span>Child's Current Age</span>
                {/* The little indigo pill on the right shows the current value as the user drags */}
                <span className="text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full text-sm">{inputs.childAge} {inputs.childAge === 1 ? 'year' : 'years'}</span>
              </label>
              <input
                id="age-slider"
                type="range"
                min={SLIDER_BOUNDS.childAge.min} max={SLIDER_BOUNDS.childAge.max} step={SLIDER_BOUNDS.childAge.step}
                value={inputs.childAge}
                onChange={(e) => handleInputChange('childAge', Number(e.target.value))}
                /* The inline style paints the indigo "filled" portion of the track to the left of the thumb */
                style={{ background: `linear-gradient(to right, #4f46e5 ${getSliderFillPct(inputs.childAge, SLIDER_BOUNDS.childAge.min, SLIDER_BOUNDS.childAge.max)}%, #e2e8f0 ${getSliderFillPct(inputs.childAge, SLIDER_BOUNDS.childAge.min, SLIDER_BOUNDS.childAge.max)}%)` }}
                className="w-full h-2 rounded-lg appearance-none focus:outline-none focus-visible:ring-4 focus-visible:ring-indigo-100 cursor-pointer"
              />
              {/* Tiny hint under the slider that teaches the CESG eligibility deadline */}
              <p className="text-xs text-slate-500 mt-3 font-medium">
                CESG eligibility ends Dec 31 of the year your child turns <span className="text-teal-600 font-bold">{CESG_LAST_AGE}</span>.
              </p>
            </div>

            {/* ROW 1, RIGHT CELL: Expected Return Rate slider */}
            <div className="flex flex-col justify-start">
              <label htmlFor="return-slider" className="flex justify-between font-semibold text-slate-800 mb-3">
                <span>Expected Return Rate</span>
                <span className="text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full text-sm">{(inputs.returnRate * 100).toFixed(1)}%</span>
              </label>
              <input
                id="return-slider"
                type="range"
                min={SLIDER_BOUNDS.returnRate.min} max={SLIDER_BOUNDS.returnRate.max} step={SLIDER_BOUNDS.returnRate.step}
                value={inputs.returnRate}
                onChange={(e) => handleInputChange('returnRate', Number(e.target.value))}
                style={{ background: `linear-gradient(to right, #4f46e5 ${getSliderFillPct(inputs.returnRate, SLIDER_BOUNDS.returnRate.min, SLIDER_BOUNDS.returnRate.max)}%, #e2e8f0 ${getSliderFillPct(inputs.returnRate, SLIDER_BOUNDS.returnRate.min, SLIDER_BOUNDS.returnRate.max)}%)` }}
                className="w-full h-2 rounded-lg appearance-none focus:outline-none focus-visible:ring-4 focus-visible:ring-indigo-100 cursor-pointer"
              />
            </div>

            {/* ROW 2, LEFT CELL: Annual Contribution slider — the most important input.
                Tip underneath nudges users toward the $2,500 "sweet spot" that captures the full $500 grant. */}
            <div className="flex flex-col justify-start">
              <label htmlFor="contribution-slider" className="flex justify-between font-semibold text-slate-800 mb-3">
                <span>Annual Contribution</span>
                <span className="text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full text-sm">{formatCurrency(inputs.annualContribution)}</span>
              </label>
              <input
                id="contribution-slider"
                type="range"
                min={SLIDER_BOUNDS.annualContribution.min} max={SLIDER_BOUNDS.annualContribution.max} step={SLIDER_BOUNDS.annualContribution.step}
                value={inputs.annualContribution}
                onChange={(e) => handleInputChange('annualContribution', Number(e.target.value))}
                style={{ background: `linear-gradient(to right, #4f46e5 ${getSliderFillPct(inputs.annualContribution, SLIDER_BOUNDS.annualContribution.min, SLIDER_BOUNDS.annualContribution.max)}%, #e2e8f0 ${getSliderFillPct(inputs.annualContribution, SLIDER_BOUNDS.annualContribution.min, SLIDER_BOUNDS.annualContribution.max)}%)` }}
                className="w-full h-2 rounded-lg appearance-none focus:outline-none focus-visible:ring-4 focus-visible:ring-indigo-100 cursor-pointer"
              />
              <p className="text-xs text-slate-500 mt-3 font-medium">
                Sweet spot: <span className="text-teal-600 font-bold">$2,500/yr</span> captures the full $500 grant.
              </p>
            </div>

            {/* ROW 2, RIGHT CELL: read-only "Years of CESG Remaining" display.
                Styled to look like the slider boxes so the 2x2 grid stays symmetric,
                but there's no actual draggable input — the value comes from the child's age. */}
            <div className="flex flex-col justify-start">
              <label className="flex justify-between font-semibold text-slate-800 mb-3">
                <span>Years of CESG Remaining</span>
                <span className="text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full text-sm">
                  {projection.yearsRemaining} {projection.yearsRemaining === 1 ? 'year' : 'years'}
                </span>
              </label>
              {/* Tiny progress bar showing "how full" the eligibility window is — pure decoration to match the slider visual */}
              <div className="w-full h-2 rounded-lg bg-slate-100 flex items-center px-1">
                <div className="h-1 rounded-full bg-indigo-200" style={{ width: `${(projection.yearsRemaining / MAX_ELIGIBLE_YEARS) * 100}%` }}></div>
              </div>
              <p className="text-xs text-slate-500 mt-3 font-medium">
                Each remaining year unlocks up to <span className="text-teal-600 font-bold">$500</span> of free grant.
              </p>
            </div>

            {/* ROW 3 (full-width): 4-Year Tuition Goal slider.
                Spans both columns and sits below the 2x2 grid with a top divider —
                same full-width-row treatment the FHSA tool uses for its reinvest-refund toggle. */}
            <div className="col-span-1 md:col-span-2 pt-6 border-t border-slate-100 flex flex-col justify-start">
              <label htmlFor="tuition-slider" className="flex justify-between font-semibold text-slate-800 mb-3">
                <span>4-Year Tuition Goal</span>
                <span className="text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full text-sm">{formatCurrency(inputs.tuitionGoal)}</span>
              </label>
              <input
                id="tuition-slider"
                type="range"
                min={SLIDER_BOUNDS.tuitionGoal.min} max={SLIDER_BOUNDS.tuitionGoal.max} step={SLIDER_BOUNDS.tuitionGoal.step}
                value={inputs.tuitionGoal}
                onChange={(e) => handleInputChange('tuitionGoal', Number(e.target.value))}
                style={{ background: `linear-gradient(to right, #4f46e5 ${getSliderFillPct(inputs.tuitionGoal, SLIDER_BOUNDS.tuitionGoal.min, SLIDER_BOUNDS.tuitionGoal.max)}%, #e2e8f0 ${getSliderFillPct(inputs.tuitionGoal, SLIDER_BOUNDS.tuitionGoal.min, SLIDER_BOUNDS.tuitionGoal.max)}%)` }}
                className="w-full h-2 rounded-lg appearance-none focus:outline-none focus-visible:ring-4 focus-visible:ring-indigo-100 cursor-pointer"
              />
              <p className="text-xs text-slate-500 mt-3 font-medium">
                In-province undergrad averages <span className="text-teal-600 font-bold">~$80K</span> total. Out-of-province or professional programs can run $150K+.
              </p>
            </div>
          </div>

          {/* WARNING BANNERS: only render when the projection actually trips a rule.
              Three possible banners — they stack vertically when more than one applies. */}

          {/* Amber banner: parent hit the $50K lifetime contribution cap before age 17 */}
          {projection.hitContribCapEarly && (
            <div className="bg-amber-50 border border-amber-200 p-5 rounded-xl flex items-start gap-4">
              <svg className="w-6 h-6 text-amber-500 shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
              </svg>
              <p className="text-amber-800 text-sm md:text-base font-medium leading-relaxed">
                You hit the <span className="font-bold">$50,000 lifetime contribution cap</span> at <strong>age {projection.contribCapAge}</strong>. Out-of-pocket contributions have stopped automatically.
              </p>
            </div>
          )}

          {/* Amber banner: parent maxed out the $7,200 lifetime grant — further contributions earn no match */}
          {projection.hitCESGCapEarly && (
            <div className="bg-amber-50 border border-amber-200 p-5 rounded-xl flex items-start gap-4">
              <svg className="w-6 h-6 text-amber-500 shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
              </svg>
              <p className="text-amber-800 text-sm md:text-base font-medium leading-relaxed">
                You've maxed out the <span className="font-bold">$7,200 lifetime CESG grant</span> at <strong>age {projection.cesgCapAge}</strong>. Any contributions after this point won't earn government match.
              </p>
            </div>
          )}

          {/* Sky-blue 16-17 eligibility banner: only shown when the simulation actually reaches age 16+.
              Two flavours of copy depending on whether the rule passed or failed in this scenario. */}
          {projection.has1617InProjection && inputs.childAge >= 13 && (
            projection.eligibleAt1617 ? (
              <div className="bg-sky-50 border border-sky-200 p-5 rounded-xl flex items-start gap-4">
                <svg className="w-6 h-6 text-sky-500 shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" />
                </svg>
                <p className="text-sky-800 text-sm md:text-base font-medium leading-relaxed">
                  <strong>Eligibility check passed:</strong> based on this projection, your child qualifies for CESG at ages 16–17 (≥$2,000 contributed before age 16, or $100+ in any 4 prior years).
                </p>
              </div>
            ) : (
              <div className="bg-amber-50 border border-amber-200 p-5 rounded-xl flex items-start gap-4">
                <svg className="w-6 h-6 text-amber-500 shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                </svg>
                <p className="text-amber-800 text-sm md:text-base font-medium leading-relaxed">
                  <strong>Eligibility check failed:</strong> based on this projection alone, your child does <em>not</em> qualify for CESG at ages 16–17 — no grant has been applied for those years. (CRA requires ≥$2,000 contributed before age 16, or $100+ in any 4 prior years.)
                </p>
              </div>
            )
          )}

          {/* THE THREE BIG SUMMARY CARDS: the "headline" numbers the user came here to see.
              Layout is a 3-column grid on desktop and a single column on mobile. */}
          <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
            {/* Card 1 (indigo, the hero card): projected balance at age 18 */}
            <div className="bg-indigo-600 text-white p-6 sm:p-8 rounded-2xl shadow-lg shadow-indigo-600/20 transform transition duration-300 hover:-translate-y-1">
              <p className="text-indigo-100 text-sm font-semibold tracking-wide uppercase mb-2">RESP Balance at Age 18</p>
              <p className="text-4xl font-extrabold">{formatCurrency(projection.totalEndingBalance)}</p>
            </div>
            {/* Card 2 (white with teal accent): total free money received from the government */}
            <div className="bg-white border border-slate-200 p-6 sm:p-8 rounded-2xl shadow-sm transform transition duration-300 hover:-translate-y-1">
              <p className="text-slate-600 text-sm font-semibold tracking-wide uppercase mb-2">Total CESG Received</p>
              <p className="text-4xl font-extrabold text-teal-600">{formatCurrency(projection.totalCESG)}</p>
            </div>
            {/* Card 3 (white with slate accent): how much of the parent's own money went in */}
            <div className="bg-white border border-slate-200 p-6 sm:p-8 rounded-2xl shadow-sm transform transition duration-300 hover:-translate-y-1">
              <p className="text-slate-600 text-sm font-semibold tracking-wide uppercase mb-2">Your Total Contributions</p>
              <p className="text-4xl font-extrabold text-slate-800">{formatCurrency(projection.totalContributions)}</p>
            </div>
          </div>

          {/* TUITION GOAL PROGRESS: translates the projection into "X% of goal covered".
              Indigo bar when there's a shortfall; teal bar when at or over the goal. */}
          <div className="bg-white border border-slate-200 p-6 sm:p-8 rounded-2xl shadow-sm space-y-6">
            <h3 className="font-bold text-slate-900 text-lg">Tuition Goal Progress</h3>
            {/* The horizontal bar. Same visual language as the "Whose Money Is It?" bar below. */}
            <div className="w-full h-10 flex rounded-xl overflow-hidden border border-slate-100 bg-slate-100">
              <div
                style={{ width: `${tuitionPctClamped}%` }}
                className={`${onTrack ? 'bg-teal-500' : 'bg-indigo-600'} transition-all duration-700 ease-out`}
                title={`${tuitionPct.toFixed(1)}% covered`}
              ></div>
            </div>
            {/* Big stat line (colour matches the bar) + smaller status line with the actual gap or surplus */}
            <div className="space-y-1">
              <p className={`text-lg font-bold ${onTrack ? 'text-teal-600' : 'text-indigo-600'}`}>
                {tuitionPct.toFixed(0)}% of {formatCurrency(inputs.tuitionGoal)} goal covered
              </p>
              <p className="text-sm text-slate-600">
                {onTrack
                  ? <>On track — <span className="font-semibold text-teal-700">{formatCurrency(-tuitionGap)}</span> above your goal.</>
                  : <>Shortfall: <span className="font-semibold text-amber-700">{formatCurrency(tuitionGap)}</span> — try raising contributions or starting earlier.</>
                }
              </p>
            </div>
          </div>

          {/* BALANCE GROWTH OVER TIME: stacked-area line chart of the projection.
              Reads projection.schedule via the <BalanceChart> component defined above. */}
          <div className="bg-white border border-slate-200 p-6 sm:p-8 rounded-2xl shadow-sm space-y-6">
            <h3 className="font-bold text-slate-900 text-lg">Balance Growth Over Time</h3>
            <BalanceChart projection={projection} />
          </div>

          {/* "WHOSE MONEY IS IT?" BAR: stacked horizontal bar split into 3 coloured segments.
              Slate = parent's contributions, Teal = government grant, Sky-blue = market growth. */}
          <div className="bg-white border border-slate-200 p-6 sm:p-8 rounded-2xl shadow-sm space-y-6">
            <h3 className="font-bold text-slate-900 text-lg">Whose Money Is It? (Portfolio Composition)</h3>
            {/* The bar itself — each <div> takes up its own % width */}
            <div className="w-full h-10 flex rounded-xl overflow-hidden border border-slate-100">
              <div style={{ width: `${contribPct}%` }} className="bg-slate-700 transition-all duration-700 ease-out" title="Your Cash"></div>
              <div style={{ width: `${cesgPct}%` }}    className="bg-teal-500 transition-all duration-700 ease-out"  title="CESG Grants"></div>
              <div style={{ width: `${growthPct}%` }}  className="bg-sky-400 transition-all duration-700 ease-out"   title="Market Growth"></div>
            </div>
            {/* Colour-coded legend below the bar showing the exact percentages */}
            <div className="flex flex-wrap gap-6 text-sm font-semibold text-slate-700">
              <div className="flex items-center gap-2"><div className="w-4 h-4 bg-slate-700 rounded-md"></div>Your Cash ({contribPct.toFixed(1)}%)</div>
              <div className="flex items-center gap-2"><div className="w-4 h-4 bg-teal-500 rounded-md"></div>CESG Grants ({cesgPct.toFixed(1)}%)</div>
              <div className="flex items-center gap-2"><div className="w-4 h-4 bg-sky-400 rounded-md"></div>Market Growth ({growthPct.toFixed(1)}%)</div>
            </div>
          </div>

          {/* YEAR-BY-YEAR DATA TABLE: full breakdown, one row per year of the projection.
              Includes the "Export CSV" button in the header so the user can take this data with them. */}
          <div className="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden">
            {/* Table header bar with title + CSV button */}
            <div className="p-5 sm:p-6 border-b border-slate-100 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-slate-50/50">
              <h3 className="font-bold text-slate-900 text-lg">Year-by-Year Growth</h3>
              <button
                onClick={handleDownloadCSV}
                className="no-print text-sm bg-white border border-slate-300 hover:bg-slate-50 hover:text-indigo-600 focus:outline-none focus-visible:ring-4 focus-visible:ring-indigo-100 text-slate-700 py-2 px-5 rounded-lg shadow-sm transition-all font-semibold flex items-center gap-2"
              >
                {/* Download arrow icon */}
                <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
                Export CSV
              </button>
            </div>

            {/* The table itself. overflow-x-auto so it scrolls horizontally on narrow phones instead of breaking the layout. */}
            <div className="overflow-x-auto">
              <table className="w-full text-sm text-left">
                <thead className="bg-white text-slate-500 font-semibold uppercase tracking-wider text-xs border-b border-slate-200">
                  <tr>
                    <th className="px-6 py-5">Child Age</th>
                    <th className="px-6 py-5">Opening Balance</th>
                    <th className="px-6 py-5">Your Contribution</th>
                    <th className="px-6 py-5">CESG Earned</th>
                    <th className="px-6 py-5">Return Earned</th>
                    <th className="px-6 py-5 text-right">Ending Balance</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-slate-100">
                  {/* Loop over each year of the projection and render one row per year */}
                  {projection.schedule.map((row) => (
                    <tr key={row.age} className="hover:bg-slate-50 transition-colors">
                      <td className="px-6 py-5 font-bold text-slate-900">{row.age}</td>
                      <td className="px-6 py-5 text-slate-600">{formatCurrency(row.openingBalance)}</td>
                      <td className="px-6 py-5 font-medium text-slate-800">{formatCurrency(row.contribution)}</td>
                      <td className="px-6 py-5 font-medium text-teal-600">{formatCurrency(row.cesgEarned)}</td>
                      <td className="px-6 py-5 font-medium text-sky-600">+{formatCurrency(row.returnEarned)}</td>
                      <td className="px-6 py-5 text-right font-bold text-slate-900">{formatCurrency(row.endingBalance)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>

          <details className="bg-slate-50 border border-slate-200 rounded-xl" open>
            <summary className="cursor-pointer px-5 py-4 text-sm font-bold text-slate-800 hover:text-indigo-700 select-none">
              Disclaimer &amp; sources
            </summary>
            <div className="px-5 pb-5 pt-1 text-sm text-slate-600 space-y-3">
              <p>This tool is illustrative only. It models the standard CESG match (20%, up to $500/year, $7,200 lifetime) and the 16–17 eligibility rule using <strong>only the contributions made inside this simulation</strong>. Real-world prior contributions, joint-RESP family-plan splits, withdrawal mechanics (EAPs), and over-contribution penalties are not modelled.</p>
              <p>It does <strong>not</strong> include Additional CESG for lower-income families, the Canada Learning Bond, or provincial grants like QESI (Quebec) or BCTESG (British Columbia). Verify your beneficiary's grant and contribution history in <a href="https://www.canada.ca/en/revenue-agency/services/e-services/cra-my-account.html" target="_blank" rel="noopener" className="underline text-indigo-600">CRA My Account</a> and consult a qualified financial advisor before acting.</p>
              <p className="text-xs text-slate-500">Not tax, legal, or investment advice.</p>
            </div>
          </details>

        </div>
      );
    }

    // M8 [DevTools Test Suite]: self-running smoke tests on page load — open DevTools console to see results.
    function runMathTests() {
      const within = (actual, expected, tolerance) =>
        Math.abs(actual - expected) < (tolerance == null ? 0.01 : tolerance);

      const tests = [
        {
          name: 'Default scenario (age 5, $2,500/yr) captures $6,500 of grant',
          run: () => {
            const r = calculateRESPSchedule({ childAge: 5, annualContribution: 2500, returnRate: 0.06 });
            return [
              { name: 'totalCESG ~ 6500',          pass: within(r.totalCESG, 6500) },
              { name: 'no contrib cap hit',        pass: r.hitContribCapEarly === false },
              { name: 'no CESG cap hit',           pass: r.hitCESGCapEarly === false },
              { name: 'eligible at 16-17',         pass: r.eligibleAt1617 === true }
            ];
          }
        },
        {
          name: 'Late starter (age 16, $5,000/yr) gets no CESG — 16-17 rule trips',
          run: () => {
            const r = calculateRESPSchedule({ childAge: 16, annualContribution: 5000, returnRate: 0.06 });
            return [
              { name: 'totalCESG === 0',           pass: r.totalCESG === 0 },
              { name: 'NOT eligible at 16-17',     pass: r.eligibleAt1617 === false }
            ];
          }
        },
        {
          name: 'Aggressive contributor (age 0, $5,000/yr) hits $50K cap at age 9',
          run: () => {
            const r = calculateRESPSchedule({ childAge: 0, annualContribution: 5000, returnRate: 0.06 });
            return [
              { name: 'hitContribCapEarly true',   pass: r.hitContribCapEarly === true },
              { name: 'contribCapAge === 9',       pass: r.contribCapAge === 9 }
            ];
          }
        },
        {
          name: 'Steady $2,500/yr from age 0 hits CESG cap at age 14',
          run: () => {
            const r = calculateRESPSchedule({ childAge: 0, annualContribution: 2500, returnRate: 0.06 });
            return [
              { name: 'hitCESGCapEarly true',      pass: r.hitCESGCapEarly === true },
              { name: 'cesgCapAge === 14',         pass: r.cesgCapAge === 14 }
            ];
          }
        },
        {
          name: 'Zero contributions yields zero balance and zero grant',
          run: () => {
            const r = calculateRESPSchedule({ childAge: 5, annualContribution: 0, returnRate: 0.06 });
            return [
              { name: 'totalEndingBalance === 0',  pass: r.totalEndingBalance === 0 },
              { name: 'totalCESG === 0',           pass: r.totalCESG === 0 }
            ];
          }
        },
        {
          name: 'Cumulative series end-points match summary totals (chart sanity)',
          run: () => {
            const r = calculateRESPSchedule({ childAge: 5, annualContribution: 2500, returnRate: 0.06 });
            let cumContrib = 0, cumCESG = 0;
            r.schedule.forEach(row => { cumContrib += row.contribution; cumCESG += row.cesgEarned; });
            const lastBalance = r.schedule[r.schedule.length - 1].endingBalance;
            return [
              { name: 'sum(contribution) === totalContributions',  pass: within(cumContrib, r.totalContributions) },
              { name: 'sum(cesgEarned) === totalCESG',             pass: within(cumCESG, r.totalCESG) },
              { name: 'last endingBalance === totalEndingBalance', pass: within(lastBalance, r.totalEndingBalance) }
            ];
          }
        }
      ];

      let passed = 0, failed = 0;
      console.group('%cRESP Math Tests', 'font-weight: bold; color: #4f46e5;');
      tests.forEach(t => {
        const results = t.run();
        const allPass = results.every(r => r.pass);
        console.log(`${allPass ? '✓' : '✗'} ${t.name}`);
        if (!allPass) {
          results.filter(r => !r.pass).forEach(r => console.log(`     ✗ failed: ${r.name}`));
        }
        allPass ? passed++ : failed++;
      });
      console.log(`%cTests: ${passed} passed, ${failed} failed`,
        `font-weight: bold; color: ${failed === 0 ? '#0d9488' : '#dc2626'};`);
      console.groupEnd();
    }
    runMathTests();

    // Hand the React component off to ReactDOM to render into the <div id="root"> we set up earlier
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<RESPCalculator />);
  </script>
</body>
</html>
