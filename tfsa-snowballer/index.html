<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The TFSA Snowballer</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    
    /* --- CUSTOM SLIDER STYLING --- */
    /* This section removes the default, boring browser sliders and replaces them with custom interactive elements */
    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      background: transparent; 
    }
    
    /* Styles the draggable circle (the "thumb") for Chrome, Safari, and Edge */
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #4f46e5; 
      cursor: pointer;
      border: 3px solid white;
      box-shadow: 0 1px 4px rgba(0,0,0,0.4); 
    }
    
    /* Styles the draggable circle for Firefox */
    input[type=range]::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #4f46e5;
      cursor: pointer;
      border: 3px solid white;
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }
  </style>
</head>
<body class="bg-[#f8fafc] min-h-screen py-10">
  <div id="root"></div>

  <script type="text/babel" data-presets="react,typescript">
    const { useState, useMemo, useEffect } = React;

    // =====================================================================
    // SECTION 1: THE MATH ENGINE
    // This handles all the calculations before we show anything on screen.
    // =====================================================================
    
    // A simplified helper to guess a user's tax bracket based on their income.
    function getMarginalTaxRate(income) {
      if (income <= 55000) return 0.20;
      if (income <= 110000) return 0.305;
      if (income <= 165000) return 0.36;
      if (income <= 235000) return 0.41;
      return 0.48;
    }

    // The main function that runs the numbers year by year.
    function calculateTFSASchedule(inputs) {
      // Step 1: Figure out how much taxes will eat into regular investments.
      // We assume a mix of stocks/dividends, so the tax on growth is roughly half their normal income tax rate.
      const marginalRate = getMarginalTaxRate(inputs.income);
      const taxDrag = marginalRate * 0.5; 
      const taxableReturnRate = inputs.returnRate * (1 - taxDrag);

      // Step 2: Set up our starting balances at zero.
      let tfsaBalance = 0;
      let taxableBalance = 0;
      let totalContributed = 0;
      
      const schedule = [];
      const yearsToGrow = inputs.retirementAge - inputs.currentAge;

      // Step 3: Loop through every single year and add the growth and new contributions.
      for (let year = 1; year <= yearsToGrow; year++) {
        const annualContribution = inputs.monthlyContribution * 12;
        
        // Calculate the TFSA (It gets the full return rate, no taxes)
        const tfsaReturn = (tfsaBalance + annualContribution / 2) * inputs.returnRate;
        tfsaBalance += annualContribution + tfsaReturn;

        // Calculate the regular account (It gets a lower return rate because of the tax drag)
        const taxableReturn = (taxableBalance + annualContribution / 2) * taxableReturnRate;
        taxableBalance += annualContribution + taxableReturn;
        
        totalContributed += annualContribution;

        // Save this year's results to our schedule so we can put it in a table later.
        schedule.push({
          year,
          age: inputs.currentAge + year,
          totalContributed,
          tfsaBalance,
          taxableBalance,
          difference: tfsaBalance - taxableBalance
        });
      }

      // Return all the final totals back to the main app.
      return {
        schedule,
        finalTfsa: tfsaBalance,
        finalTaxable: taxableBalance,
        totalContributed,
        totalLostToTaxes: tfsaBalance - taxableBalance,
        effectiveTaxDrag: (taxDrag * 100).toFixed(1)
      };
    }

    // =====================================================================
    // SECTION 2: THE USER INTERFACE (UI)
    // This creates the sliders, text, and visual layout.
    // =====================================================================
    function TFSACalculator() {
      // Set the default numbers that show up when the tool first loads.
      const defaultInputs = { 
        currentAge: 25, 
        retirementAge: 65, 
        monthlyContribution: 500, 
        returnRate: 0.07, 
        income: 75000
      };

      // Set up React State to remember the user's choices. 
      // It also checks the browser's local storage to see if they visited before.
      const [inputs, setInputs] = useState(() => {
        const savedData = localStorage.getItem('tfsa_user_inputs_v1');
        if (savedData) {
          try { return JSON.parse(savedData); } catch (e) { }
        }
        return defaultInputs;
      });

      // Every time the user moves a slider, save the new numbers to local storage.
      useEffect(() => {
        localStorage.setItem('tfsa_user_inputs_v1', JSON.stringify(inputs));
      }, [inputs]);

      // Run the math engine using the current slider values. 
      // useMemo ensures we only run the math when the numbers actually change.
      const projection = useMemo(() => calculateTFSASchedule(inputs), [inputs]);

      // A quick helper to format numbers into Canadian currency (e.g., $1,000).
      const formatCurrency = (val) => 
        new Intl.NumberFormat('en-CA', { style: 'currency', currency: 'CAD', maximumFractionDigits: 0 }).format(val);

      // This triggers whenever a slider is moved, updating the app's state.
      const handleInputChange = (field, value) => {
        setInputs(prev => ({ ...prev, [field]: value }));
      };

      // Resets all sliders back to the default values.
      const handleReset = () => setInputs(defaultInputs);

      // A helper to figure out what percentage of the slider should be colored blue.
      const getSliderFillPct = (value, min, max) => ((value - min) / (max - min)) * 100;

      // Calculate the percentages for the colorful composition bar chart.
      const maxBalance = Math.max(projection.finalTfsa, 1);
      const contributedPct = (projection.totalContributed / maxBalance) * 100;
      const tfsaGrowthPct = ((projection.finalTfsa - projection.totalContributed) / maxBalance) * 100;

      return (
        <div className="max-w-6xl mx-auto p-4 sm:p-6 lg:p-8 space-y-10 text-slate-800">
          
          {/* Main Title Area */}
          <div className="text-center space-y-3 relative">
            <h1 className="text-4xl font-extrabold tracking-tight text-slate-900">The TFSA Snowballer</h1>
            <p className="text-lg text-slate-600 max-w-2xl mx-auto">
              See the raw mathematical advantage of tax-free compounding versus a standard taxable investment account.
            </p>
            
            <button 
              onClick={handleReset}
              className="absolute top-0 right-0 mt-2 mr-2 text-sm text-slate-500 hover:text-indigo-600 transition-colors font-medium underline underline-offset-4"
            >
              Reset Defaults
            </button>
          </div>

          {/* Sliders Container */}
          <div className="bg-white p-6 sm:p-8 rounded-2xl shadow-lg shadow-slate-200/50 border border-slate-200 grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-10">
            
            <div className="flex flex-col justify-start">
              <label htmlFor="age-slider" className="flex justify-between font-semibold text-slate-800 mb-3">
                <span>Current Age</span>
                <span className="text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full text-sm">{inputs.currentAge} Years</span>
              </label>
              <input 
                id="age-slider" type="range" min="18" max="60" step="1" 
                value={inputs.currentAge}
                onChange={(e) => handleInputChange('currentAge', Number(e.target.value))}
                style={{ background: `linear-gradient(to right, #4f46e5 ${getSliderFillPct(inputs.currentAge, 18, 60)}%, #e2e8f0 ${getSliderFillPct(inputs.currentAge, 18, 60)}%)` }}
                className="w-full h-2 rounded-lg appearance-none focus:outline-none focus-visible:ring-4 focus-visible:ring-indigo-100 cursor-pointer"
              />
            </div>

            <div className="flex flex-col justify-start">
              <label htmlFor="retire-slider" className="flex justify-between font-semibold text-slate-800 mb-3">
                <span>Withdrawal Age</span>
                <span className="text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full text-sm">{inputs.retirementAge} Years</span>
              </label>
              <input 
                id="retire-slider" type="range" min={inputs.currentAge + 1} max="85" step="1" 
                value={inputs.retirementAge}
                onChange={(e) => handleInputChange('retirementAge', Number(e.target.value))}
                style={{ background: `linear-gradient(to right, #4f46e5 ${getSliderFillPct(inputs.retirementAge, inputs.currentAge + 1, 85)}%, #e2e8f0 ${getSliderFillPct(inputs.retirementAge, inputs.currentAge + 1, 85)}%)` }}
                className="w-full h-2 rounded-lg appearance-none focus:outline-none focus-visible:ring-4 focus-visible:ring-indigo-100 cursor-pointer"
              />
            </div>

            <div className="flex flex-col justify-start">
              <label htmlFor="contrib-slider" className="flex justify-between font-semibold text-slate-800 mb-3">
                <span>Monthly Contribution</span>
                <span className="text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full text-sm">{formatCurrency(inputs.monthlyContribution)}/mo</span>
              </label>
              <input 
                id="contrib-slider" type="range" min="50" max="2500" step="25" 
                value={inputs.monthlyContribution}
                onChange={(e) => handleInputChange('monthlyContribution', Number(e.target.value))}
                style={{ background: `linear-gradient(to right, #4f46e5 ${getSliderFillPct(inputs.monthlyContribution, 50, 2500)}%, #e2e8f0 ${getSliderFillPct(inputs.monthlyContribution, 50, 2500)}%)` }}
                className="w-full h-2 rounded-lg appearance-none focus:outline-none focus-visible:ring-4 focus-visible:ring-indigo-100 cursor-pointer"
              />
            </div>

            <div className="flex flex-col justify-start">
              <label htmlFor="return-slider" className="flex justify-between font-semibold text-slate-800 mb-3">
                <span>Expected Return Rate</span>
                <span className="text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full text-sm">{(inputs.returnRate * 100).toFixed(1)}%</span>
              </label>
              <input 
                id="return-slider" type="range" min="0" max="0.12" step="0.005" 
                value={inputs.returnRate}
                onChange={(e) => handleInputChange('returnRate', Number(e.target.value))}
                style={{ background: `linear-gradient(to right, #4f46e5 ${getSliderFillPct(inputs.returnRate, 0, 0.12)}%, #e2e8f0 ${getSliderFillPct(inputs.returnRate, 0, 0.12)}%)` }}
                className="w-full h-2 rounded-lg appearance-none focus:outline-none focus-visible:ring-4 focus-visible:ring-indigo-100 cursor-pointer"
              />
            </div>

            <div className="flex flex-col justify-start col-span-1 md:col-span-2">
              <label htmlFor="income-slider" className="flex justify-between font-semibold text-slate-800 mb-3">
                <span>Annual Income (For Tax Drag)</span>
                <span className="text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full text-sm">{formatCurrency(inputs.income)}</span>
              </label>
              <input 
                id="income-slider" type="range" min="30000" max="250000" step="5000" 
                value={inputs.income}
                onChange={(e) => handleInputChange('income', Number(e.target.value))}
                style={{ background: `linear-gradient(to right, #4f46e5 ${getSliderFillPct(inputs.income, 30000, 250000)}%, #e2e8f0 ${getSliderFillPct(inputs.income, 30000, 250000)}%)` }}
                className="w-full h-2 rounded-lg appearance-none focus:outline-none focus-visible:ring-4 focus-visible:ring-indigo-100 cursor-pointer"
              />
              <p className="text-xs text-slate-500 mt-3 font-medium">
                Estimated Tax Drag on Growth: <span className="text-amber-600 font-bold">{projection.effectiveTaxDrag}%</span>
              </p>
            </div>
          </div>

          {/* Three Summary Cards Container */}
          <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div className="bg-indigo-600 text-white p-6 sm:p-8 rounded-2xl shadow-lg shadow-indigo-600/20 transform transition duration-300 hover:-translate-y-1">
              <p className="text-indigo-100 text-sm font-semibold tracking-wide uppercase mb-2">Final TFSA Balance</p>
              <p className="text-4xl font-extrabold">{formatCurrency(projection.finalTfsa)}</p>
            </div>
            <div className="bg-white border border-slate-200 p-6 sm:p-8 rounded-2xl shadow-sm transform transition duration-300 hover:-translate-y-1">
              <p className="text-slate-600 text-sm font-semibold tracking-wide uppercase mb-2">Taxable Account Balance</p>
              <p className="text-4xl font-extrabold text-slate-800">{formatCurrency(projection.finalTaxable)}</p>
            </div>
            <div className="bg-white border border-amber-200 p-6 sm:p-8 rounded-2xl shadow-sm transform transition duration-300 hover:-translate-y-1 bg-amber-50">
              <p className="text-amber-800 text-sm font-semibold tracking-wide uppercase mb-2">Total Lost to Taxes</p>
              <p className="text-4xl font-extrabold text-amber-600">-{formatCurrency(projection.totalLostToTaxes)}</p>
            </div>
          </div>

          {/* Colorful Composition Bar */}
          <div className="bg-white border border-slate-200 p-6 sm:p-8 rounded-2xl shadow-sm space-y-6">
            <h3 className="font-bold text-slate-900 text-lg">TFSA Portfolio Composition</h3>
            <div className="w-full h-10 flex rounded-xl overflow-hidden border border-slate-100">
              <div style={{ width: `${contributedPct}%` }} className="bg-slate-700 transition-all duration-700 ease-out" title="Your Cash"></div>
              <div style={{ width: `${tfsaGrowthPct}%` }} className="bg-sky-400 transition-all duration-700 ease-out" title="Tax-Free Growth"></div>
            </div>
            <div className="flex flex-wrap gap-6 text-sm font-semibold text-slate-700">
              <div className="flex items-center gap-2"><div className="w-4 h-4 bg-slate-700 rounded-md"></div>Your Contributions ({contributedPct.toFixed(1)}%)</div>
              <div className="flex items-center gap-2"><div className="w-4 h-4 bg-sky-400 rounded-md"></div>Tax-Free Growth ({tfsaGrowthPct.toFixed(1)}%)</div>
            </div>
          </div>

          {/* Year-by-Year Table */}
          <div className="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden">
            <div className="p-5 sm:p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
              <h3 className="font-bold text-slate-900 text-lg">Year-by-Year Growth</h3>
            </div>

            <div className="overflow-x-auto">
              <table className="w-full text-sm text-left">
                <thead className="bg-white text-slate-500 font-semibold uppercase tracking-wider text-xs border-b border-slate-200">
                  <tr>
                    <th className="px-6 py-5">Age</th>
                    <th className="px-6 py-5">Total Contributed</th>
                    <th className="px-6 py-5">TFSA (Tax-Free)</th>
                    <th className="px-6 py-5">Taxable Account</th>
                    <th className="px-6 py-5 text-right">Lost to Taxes</th>
                  </tr>
                </thead>
                <tbody className="divide-y divide-slate-100">
                  {projection.schedule.map((row) => (
                    <tr key={row.year} className="hover:bg-slate-50 transition-colors">
                      <td className="px-6 py-5 font-bold text-slate-900">{row.age}</td>
                      <td className="px-6 py-5 font-medium text-slate-800">{formatCurrency(row.totalContributed)}</td>
                      <td className="px-6 py-5 font-bold text-indigo-600">{formatCurrency(row.tfsaBalance)}</td>
                      <td className="px-6 py-5 text-slate-600">{formatCurrency(row.taxableBalance)}</td>
                      <td className="px-6 py-5 text-right font-medium text-amber-600">-{formatCurrency(row.difference)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<TFSACalculator />);
  </script>
</body>
</html>
